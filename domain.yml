version: "3.1"

# ============================================================================
# Dominio: orientación vocacional en dos etapas (perfil general + rama STEM).
# - Etapa 1: macro_area + tipo_actividad
# - Etapa 2 (solo si macro_area = stem): stem_preferencia + stem_estilo_trabajo
# - Los slots STEM se añaden dinámicamente vía validate_formulario_vocacional
# ============================================================================

intents:
  - saludar
  - despedida
  - afirmar
  - denegar
  - tal_vez
  - iniciar_cuestionario
  - pedir_ayuda
  - bot_challenge
  - nlu_fallback
  # Etapa 1 — área macro
  - elegir_stem
  - elegir_salud
  - elegir_humanidades
  - elegir_otro
  # Etapa 1 — tipo de actividad preferida
  - actividad_analitica
  - actividad_social
  - actividad_creativa
  # Etapa 2 — preferencias STEM
  - prefiere_matematicas
  - prefiere_programacion
  - prefiere_construir
  - estilo_abstracto
  - estilo_aplicado

slots:
  macro_area:
    type: categorical
    values: [stem, salud, humanidades, otro]
    influence_conversation: false
    mappings:
      - type: from_intent
        intent: elegir_stem
        value: stem
        conditions:
          - active_loop: formulario_vocacional
            requested_slot: macro_area
      - type: from_intent
        intent: elegir_salud
        value: salud
        conditions:
          - active_loop: formulario_vocacional
            requested_slot: macro_area
      - type: from_intent
        intent: elegir_humanidades
        value: humanidades
        conditions:
          - active_loop: formulario_vocacional
            requested_slot: macro_area
      - type: from_intent
        intent: elegir_otro
        value: otro
        conditions:
          - active_loop: formulario_vocacional
            requested_slot: macro_area

  tipo_actividad:
    type: categorical
    values: [analitico, social, creativo]
    influence_conversation: false
    mappings:
      - type: from_intent
        intent: actividad_analitica
        value: analitico
        conditions:
          - active_loop: formulario_vocacional
            requested_slot: tipo_actividad
      - type: from_intent
        intent: actividad_social
        value: social
        conditions:
          - active_loop: formulario_vocacional
            requested_slot: tipo_actividad
      - type: from_intent
        intent: actividad_creativa
        value: creativo
        conditions:
          - active_loop: formulario_vocacional
            requested_slot: tipo_actividad

  stem_preferencia:
    type: categorical
    values: [matematicas, programacion, construccion_fisica]
    influence_conversation: false
    mappings:
      - type: from_intent
        intent: prefiere_matematicas
        value: matematicas
        conditions:
          - active_loop: formulario_vocacional
            requested_slot: stem_preferencia
      - type: from_intent
        intent: prefiere_programacion
        value: programacion
        conditions:
          - active_loop: formulario_vocacional
            requested_slot: stem_preferencia
      - type: from_intent
        intent: prefiere_construir
        value: construccion_fisica
        conditions:
          - active_loop: formulario_vocacional
            requested_slot: stem_preferencia

  stem_estilo_trabajo:
    type: categorical
    values: [abstracto, aplicado]
    influence_conversation: false
    mappings:
      - type: from_intent
        intent: estilo_abstracto
        value: abstracto
        conditions:
          - active_loop: formulario_vocacional
            requested_slot: stem_estilo_trabajo
      - type: from_intent
        intent: estilo_aplicado
        value: aplicado
        conditions:
          - active_loop: formulario_vocacional
            requested_slot: stem_estilo_trabajo

  carrera_recomendada:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

forms:
  formulario_vocacional:
    required_slots:
      - macro_area
      - tipo_actividad

responses:
  utter_saludar:
    - text: "¡Hola! Soy tu asistente de orientación vocacional. Te haré unas preguntas breves para orientarte hacia un área y, si encaja, profundizar en opciones STEM. ¿Quieres empezar? Di que quieres orientación vocacional cuando estés listo."

  utter_despedida:
    - text: "¡Mucho éxito en tu camino académico! Recuerda que esta recomendación es solo una guía. Hasta pronto."
    - text: "Nos vemos. ¡Sigue explorando tus intereses con calma!"

  utter_pedir_ayuda:
    - text: "Te haré 2 preguntas generales sobre tu área de interés y cómo te gusta trabajar. Si eliges ciencia y tecnología (STEM), te haré 2 preguntas más sobre matemáticas, programación o construcción física. Responde eligiendo una de las opciones que te doy en cada pregunta. ¿Empezamos con 'quiero orientación vocacional'?"

  utter_bot_challenge:
    - text: "Soy un asistente virtual hecho con Rasa, diseñado para ayudarte a explorar carreras según tus respuestas."

  utter_recomendacion_intro:
    - text: "Perfecto, ya tengo tus respuestas. Déjame analizarlas..."

  utter_default:
    - text: "Disculpa, no entendí eso. ¿Podrías reformularlo? Si quieres el test vocacional, di 'quiero orientación vocacional'. En cada pregunta elige una de las opciones que te indico (por ejemplo STEM, salud, humanidades u otro)."

  utter_ask_macro_area:
    - text: "Pregunta 1 de 2 (perfil general): ¿En qué gran área te ves más? Responde con una de estas ideas — STEM (ciencia, tecnología, ingeniería y matemáticas), salud o medicina, humanidades o ciencias sociales, u otra cosa / aún no lo tengo claro."

  utter_ask_tipo_actividad:
    - text: "Pregunta 2 de 2 (perfil general): ¿Qué tipo de actividades te atraen más? — analíticas (datos, lógica, argumentación), sociales (personas, equipos, escucha) o creativas (ideas nuevas, expresión, diseño)."

  utter_ask_stem_preferencia:
    - text: "Pregunta extra (STEM): entre estas tres, ¿cuál te representa más? — matemáticas y modelado, programación y software, o construir / sistemas físicos y mecánica."

  utter_ask_stem_estilo_trabajo:
    - text: "Última pregunta (STEM): ¿prefieres un trabajo más abstracto (teoría, algoritmos, modelos) o más aplicado (proyectos concretos, campo, prototipos)?"

actions:
  - action_recommend_career
  - validate_formulario_vocacional

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
