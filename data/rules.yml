version: "3.1"

# ============================================================================
# Reglas: small talk + activación y envío del formulario vocacional.
# La rama STEM se resuelve dentro del form (required_slots dinámico).
# ============================================================================

rules:

  - rule: Saludar al iniciar la conversación
    steps:
      - intent: saludar
      - action: utter_saludar

  - rule: Despedirse
    steps:
      - intent: despedida
      - action: utter_despedida

  - rule: Responder cuando el usuario pide ayuda
    steps:
      - intent: pedir_ayuda
      - action: utter_pedir_ayuda

  - rule: Responder al bot challenge
    steps:
      - intent: bot_challenge
      - action: utter_bot_challenge

  - rule: Activar el formulario vocacional
    steps:
      - intent: iniciar_cuestionario
      - action: formulario_vocacional
      - active_loop: formulario_vocacional

  - rule: Enviar formulario y recomendar carrera
    condition:
      - active_loop: formulario_vocacional
    steps:
      - action: formulario_vocacional
      - active_loop: null
      - slot_was_set:
          - requested_slot: null
      - action: utter_recomendacion_intro
      - action: action_recommend_career

  - rule: Fallback NLU
    steps:
      - intent: nlu_fallback
      - action: utter_default
