version: "3.1"

# ============================================================================
# NLU en español: perfil general + rama STEM (intents categóricos).
# ============================================================================

nlu:

  - intent: saludar
    examples: |
      - hola
      - buenas
      - buenos días
      - buenas tardes
      - buenas noches
      - qué tal
      - hey
      - holi
      - saludos
      - hola bot

  - intent: despedida
    examples: |
      - adiós
      - hasta luego
      - nos vemos
      - chao
      - hasta pronto
      - me voy
      - bye
      - hasta la próxima
      - cuídate
      - me tengo que ir

  - intent: afirmar
    examples: |
      - sí
      - si
      - claro
      - por supuesto
      - obvio
      - definitivamente
      - me encanta
      - así es
      - correcto
      - exacto
      - me gusta mucho
      - bastante
      - sí, mucho
      - totalmente

  - intent: denegar
    examples: |
      - no
      - para nada
      - no me gusta
      - no realmente
      - negativo
      - claro que no
      - jamás
      - nunca
      - no me interesa
      - en absoluto
      - no me llama la atención
      - no mucho

  - intent: tal_vez
    examples: |
      - tal vez
      - quizás
      - quizá
      - más o menos
      - no estoy seguro
      - no estoy segura
      - puede ser
      - a veces
      - depende
      - regular
      - así así
      - ni mucho ni poco

  - intent: iniciar_cuestionario
    examples: |
      - quiero orientación vocacional
      - ayúdame a elegir carrera
      - no sé qué estudiar
      - quiero un test vocacional
      - recomiéndame una carrera
      - quiero saber qué carrera estudiar
      - empecemos el cuestionario
      - inicia el test
      - quiero hacer el test
      - dime qué carrera me conviene
      - estoy indeciso con la carrera
      - ayúdame a decidir mi carrera

  - intent: pedir_ayuda
    examples: |
      - ayuda
      - necesito ayuda
      - cómo funciona esto
      - qué puedes hacer
      - explícame
      - no entiendo
      - cómo me ayudas
      - qué haces
      - cómo usar el bot
      - qué debo responder

  - intent: bot_challenge
    examples: |
      - ¿eres un bot?
      - ¿eres humano?
      - ¿con quién hablo?
      - ¿quién eres?
      - ¿eres una persona real?
      - ¿esto es un robot?
      - ¿quién me responde?

  # ----- Etapa 1: área macro -----

  - intent: elegir_stem
    examples: |
      - me gustan más las áreas de ciencia y tecnología
      - lo mío es STEM
      - prefiero ingeniería y ciencias exactas
      - me interesa la tecnología y las matemáticas
      - quiero algo técnico
      - me inclino por STEM
      - ciencia ingeniería y matemáticas
      - prefiero carreras de ciencias exactas

  - intent: elegir_salud
    examples: |
      - me interesa la salud
      - quiero algo relacionado con medicina
      - lo mío es la medicina
      - me atrae el área de la salud
      - prefiero biología y salud
      - me gusta ayudar curando
      - quiero estudiar algo de salud
      - me veo en el hospital o clínica

  - intent: elegir_humanidades
    examples: |
      - prefiero humanidades
      - me interesan las ciencias sociales
      - lo mío es lo social y humanístico
      - quiero estudiar algo de letras o sociedad
      - me atrae el derecho la historia o la psicología
      - prefiero trabajar con personas e ideas sociales
      - no me gusta tanto lo técnico prefiero humanidades
      - me inclino por ciencias sociales y humanidades

  - intent: elegir_otro
    examples: |
      - no lo tengo claro
      - otra cosa
      - ninguna de las anteriores
      - aún no sé
      - estoy entre varias áreas
      - no encajo en esas opciones
      - prefiero no elegir todavía
      - no estoy seguro del área

  # ----- Etapa 1: tipo de actividad -----

  - intent: actividad_analitica
    examples: |
      - prefiero actividades analíticas
      - lo mío es lo analítico
      - me gusta analizar datos y lógica
      - prefiero razonar y argumentar
      - me gustan los problemas lógicos
      - trabajo bien con números y estructuras
      - prefiero el análisis antes que lo social puro
      - me atrae lo analítico y sistemático

  - intent: actividad_social
    examples: |
      - prefiero actividades sociales
      - me gusta trabajar con gente
      - lo mío es escuchar y apoyar
      - prefiero equipos y personas
      - me motiva lo social
      - quiero trabajar ayudando a otros directamente
      - prefiero lo interpersonal
      - me atrae lo relacionado con personas

  - intent: actividad_creativa
    examples: |
      - prefiero actividades creativas
      - me gusta crear e inventar
      - lo mío es la creatividad
      - prefiero ideas nuevas y diseño
      - me motiva lo artístico y expresivo
      - quiero espacio para innovar
      - prefiero proyectos creativos
      - me atrae lo creativo y abierto

  # ----- Etapa 2: STEM -----

  - intent: prefiere_matematicas
    examples: |
      - prefiero matemáticas y modelado
      - lo mío son las matemáticas
      - me gusta el modelado matemático
      - prefiero fórmulas y teoría matemática
      - me encantan las matemáticas
      - quiero trabajar con modelos y ecuaciones
      - prefiero estadística y matemáticas
      - me inclino por el rigor matemático

  - intent: prefiere_programacion
    examples: |
      - me gusta programar
      - prefiero escribir código
      - lo mío es la programación
      - me encanta el desarrollo de software
      - prefiero trabajar con código antes que con fórmulas solas
      - quiero dedicarme al software
      - prefiero informática y código
      - me motiva programar aplicaciones

  - intent: prefiere_construir
    examples: |
      - prefiero construir cosas físicas
      - me gusta la mecánica y los sistemas físicos
      - lo mío es armar prototipos y máquinas
      - prefiero robótica y hardware
      - me atrae la ingeniería mecánica aplicada
      - quiero trabajar con sensores y actuadores
      - prefiero taller y prototipos
      - me gusta lo tangible y mecánico

  - intent: estilo_abstracto
    examples: |
      - prefiero trabajo abstracto
      - me gusta la teoría y los algoritmos
      - lo mío son modelos y abstracción
      - prefiero pensar en conceptos antes que en obra física
      - me motiva lo teórico
      - quiero enfoque en modelos y algoritmos
      - prefiero el lado abstracto
      - trabajo mejor con ideas abstractas

  - intent: estilo_aplicado
    examples: |
      - prefiero trabajo aplicado
      - me gustan proyectos concretos
      - lo mío es salir al campo y construir
      - prefiero prototipos y obra aplicada
      - me motiva lo práctico de inmediato
      - quiero ver resultados tangibles en proyectos
      - prefiero aplicación directa
      - me inclino por lo aplicado y de proyecto
