# Canales de comunicación habilitados.
# Para desarrollo local con `rasa shell` no es necesario configurar nada.

# Canal REST (útil para integraciones HTTP simples).
rest:
#  # No requiere credenciales

# Canal nativo de Rasa (UI de Rasa X / Enterprise).
rasa:
  url: "http://localhost:5002/api"

# Ejemplos de canales adicionales (descomenta y completa si los necesitas):
# socketio:
#   user_message_evt: user_uttered
#   bot_message_evt: bot_uttered
#   session_persistence: true
#
# telegram:
#   access_token: "<TOKEN>"
#   verify: "<NOMBRE_DEL_BOT>"
#   webhook_url: "https://<HOST>/webhooks/telegram/webhook"
