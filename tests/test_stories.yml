version: "3.1"

# ============================================================================
# Tests end-to-end: `rasa test` — flujo STEM y flujo general (sin STEM).
# ============================================================================

stories:

  - story: test - flujo STEM completo hasta recomendación
    steps:
      - user: |
          hola
        intent: saludar
      - action: utter_saludar
      - user: |
          quiero orientación vocacional
        intent: iniciar_cuestionario
      - action: formulario_vocacional
      - active_loop: formulario_vocacional
      - user: |
          lo mío es STEM
        intent: elegir_stem
      - slot_was_set:
          - macro_area: stem
      - user: |
          prefiero actividades analíticas
        intent: actividad_analitica
      - slot_was_set:
          - tipo_actividad: analitico
      - user: |
          prefiero matemáticas y modelado
        intent: prefiere_matematicas
      - slot_was_set:
          - stem_preferencia: matematicas
      - user: |
          prefiero trabajo abstracto
        intent: estilo_abstracto
      - slot_was_set:
          - stem_estilo_trabajo: abstracto
      - active_loop: null
      - slot_was_set:
          - requested_slot: null
      - action: utter_recomendacion_intro
      - action: action_recommend_career
      - user: |
          adiós
        intent: despedida
      - action: utter_despedida

  - story: test - flujo salud sin preguntas STEM
    steps:
      - user: |
          quiero orientación vocacional
        intent: iniciar_cuestionario
      - action: formulario_vocacional
      - active_loop: formulario_vocacional
      - user: |
          me interesa la salud
        intent: elegir_salud
      - slot_was_set:
          - macro_area: salud
      - user: |
          prefiero actividades sociales
        intent: actividad_social
      - slot_was_set:
          - tipo_actividad: social
      - active_loop: null
      - slot_was_set:
          - requested_slot: null
      - action: utter_recomendacion_intro
      - action: action_recommend_career
